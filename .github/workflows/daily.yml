name: Daily AI Bubble Index Update

on:
  # 미국 장 마감 후 — 평일 21:30 UTC (= 익일 06:30 KST)
  schedule:
    - cron: '30 21 * * 1-5'
  # 수동 트리거 (Actions 탭 → Run workflow)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # optional — 없으면 CSV 엔드포인트 사용
        run: python -m src.run_collect

      - name: Score
        run: python -m src.run_score

      - name: Validate (backtest + sensitivity)
        run: python -m src.run_validate

      # raw + processed parquet + snapshots CSV 모두 커밋
      # Streamlit Cloud 가 parquet 파일을 직접 읽으므로 함께 반영해야 함
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/processed/ data/snapshots/
          git diff --staged --quiet || \
            git commit -m "data: daily update $(date -u '+%Y-%m-%d')"
          git push

      # 최근 30일 스냅샷을 Actions 아티팩트로도 보관
      - name: Upload snapshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ github.run_id }}
          path: data/snapshots/
          retention-days: 90
