[theme]
base            = "dark"
primaryColor    = "#e67e22"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1d27"
textColor       = "#e8eaf6"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
