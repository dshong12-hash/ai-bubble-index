[theme]
base                     = "light"
primaryColor             = "#e67e22"
backgroundColor          = "#f0f2f6"
secondaryBackgroundColor = "#ffffff"
textColor                = "#1a1f2e"
font                     = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
